    <!--
      SPA routing fix for GitHub Pages: when 404.html redirects here with a
      query-string-encoded path, this decodes it back into a real URL
      *before* React Router mounts, so refreshes and deep links work.
      See: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          )
        }
      })(window.location)
    </script>
